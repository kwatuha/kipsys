worker_processes auto;
events {
    worker_connections 2048; # Increased for better concurrency
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # --- RATE LIMITING (see deploy/TROUBLESHOOTING-503.md) ---
    # Exceeding these returns 503 by default. SPAs fire many parallel /api/ calls; users behind
    # one NAT IP share one bucket — keep rates generous. Tune down only if you need abuse protection.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=80r/s;

    upstream frontend {
        server kiplombe_frontend:3000 max_fails=5 fail_timeout=60s;
        keepalive 32;
    }

    upstream api {
        server api:3001 max_fails=5 fail_timeout=60s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # Let’s Encrypt HTTP-01 (certbot: certonly --webroot -w .../deploy/certbot/www)
        # Must be before location / so ACME is not proxied to Next.js.
        location ^~ /.well-known/acme-challenge/ {
            default_type "text/plain";
            root /var/www/certbot;
        }

        # Frontend
        location / {
            # Burst allows parallel asset requests on first paint (many users share one IP via NAT)
            limit_req zone=general_limit burst=120 nodelay;
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Add timeouts to prevent 502 errors during startup
            proxy_connect_timeout 90s;
            proxy_send_timeout 90s;
            proxy_read_timeout 90s;

            # Retry on connection failures
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 30s;

            # Add buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # API endpoints
        location /api/ {
            # Dashboards often load 20–50 XHRs at once; NAT puts many users behind one IP.
            limit_req zone=api_limit burst=150 nodelay;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            proxy_connect_timeout 90s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 20s;

            # --- ADDED BUFFERS (Important for Invoice Data) ---
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Handle uploads
        location /uploads/ {
            proxy_pass http://api/uploads/;
            proxy_set_header Host $host;
            client_max_body_size 50M;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
        }
    }
}